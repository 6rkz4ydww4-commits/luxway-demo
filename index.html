/* ============================================================

// Modello piattaforma: abbonamento mensile (9 € + 5 €/hotel + IVA, primo mese gratis).
// Volutamente NON mostrato nella demo: se ne parla in fase contrattuale.

const MAX_MARKUP = 25;

/* Date dinamiche: la demo è sempre "fresca" qualunque giorno la apri */
const _d = (offset) => {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
};

/* Accordi tariffari specifici per struttura (override del listino standard) */
const HOTEL_RATES = {
  h5: { Fiumicino: { car: 55 }, Ciampino: { car: 55 } }, // Globus: berlina a 55 €
};

/* Numero WhatsApp Business di LuxWay (segnaposto — da sostituire col numero reale) */
const WHATSAPP_NUMBER = "393290937951";

/* LISTINO UFFICIALE LuxWay (tariffe nette hotel): berlina/SUV fino a 4 pax, van 5–8 pax */
const PLACES = [
  { key: "Fiumicino", label: "Aeroporto di Fiumicino (FCO)", car: 60, van: 75 },
  { key: "Ciampino", label: "Aeroporto di Ciampino (CIA)", car: 60, van: 75 },
  { key: "Civitavecchia", label: "Porto di Civitavecchia", car: 160, van: 180 },
];

const hotelLabel = (h) => `${h.name} — ${h.address}`;

/* Listino operatore per la tratta: dipende dal VEICOLO scelto (suggerito dai pax, confermato dall'utente) */
const routeBase = (pickup, dropoff, vehicle, hotelId) => {
  const find = (s) => PLACES.find((p) => (s || "").toLowerCase().includes(p.key.toLowerCase()));
  const a = find(pickup);
  const b = find(dropoff);
  const place = a && !b ? a : b && !a ? b : null;
  if (!place) return 0;
  const v = vehicle === "van" ? "van" : "car";
  const override = HOTEL_RATES[hotelId] && HOTEL_RATES[hotelId][place.key];
  return override && override[v] != null ? override[v] : place[v];
};

const suggestVehicle = (pax) => ((Number(pax) || 1) <= 4 ? "car" : "van");
const vehicleLabel = (v) => (v === "van" ? "Van (5–8 pax)" : "Berlina/SUV");

const TRIPADVISOR_URL = "https://it.tripadvisor.ch/UserReviewEdit-g187791-d33680217-LuxWay-Rome_Lazio.html";

/* Link al tracking live del volo (Flightradar24) */
const flightUrl = (flight) =>
  `https://www.flightradar24.com/data/flights/${(flight || "").replace(/\s+/g, "").toLowerCase()}`;

/* Rileva il tipo di punto di partenza per i campi di arrivo */
const isAirport = (s) => /fiumicino|ciampino/i.test(s || "");
const isPort = (s) => /civitavecchia/i.test(s || "");

/* Commissione hotel su una corsa: eccedenza del prezzo cliente sul listino */
const hotelCut = (r) => Math.max(0, (r.price || 0) - (r.base || 0));

/* Export report corse: Excel (.xlsx) se la libreria è disponibile, altrimenti CSV */
const exportRides = (rows, filename) => {
  const header = ["Data", "Ora", "Codice", "Hotel", "Ospite", "Receptionist", "Tratta", "Pax", "Veicolo", "Autista", "Prezzo cliente €", "Listino €", "Commissione hotel €"];
  const data = rows.map((r) => {
    const h = HOTELS.find((x) => x.id === r.hotelId);
    return [
      r.date, r.time, r.code, h ? h.name : "", r.client, r.receptionist || "",
      `${r.pickup} → ${r.dropoff}`, r.pax, vehicleLabel(r.vehicle),
      r.driver || "", r.price || 0, r.base || 0, hotelCut(r),
    ];
  });
  if (typeof XLSX !== "undefined") {
    const ws = XLSX.utils.aoa_to_sheet([header, ...data]);
    ws["!cols"] = header.map((hh, i) => ({ wch: i === 6 ? 48 : Math.max(10, hh.length + 2) }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Corse");
    XLSX.writeFile(wb, filename + ".xlsx");
  } else {
    const csv = [header, ...data]
      .map((row) => row.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(";"))
      .join("\n");
    const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename + ".csv";
    a.click();
    URL.revokeObjectURL(a.href);
  }
};

const eur = (n) =>

const dateIT = (iso) => {

  if (iso === TODAY) return "Oggi";
  if (iso === TOMORROW) return "Domani";
  const [y, m, d] = iso.split("-");

};

/* Pulsante con feedback: pressione, attesa breve con spinner, poi azione */
function ActionButton({ label, busyLabel, onAction, disabled, className, style }) {
  const [busy, setBusy] = useState(false);
  const run = () => {
    if (disabled || busy) return;
    setBusy(true);
    setTimeout(() => {
      onAction();
      setBusy(false);
    }, 650);
  };
  return (
    <button onClick={run} disabled={disabled || busy} className={className} style={style}>
      {busy ? <span className="spin-dot" /> : null}
      {busy ? busyLabel || "Un attimo…" : label}
    </button>
  );
}

function HotelPanel({ hotel, rides, onNewRide, onUpdate, onExit }) {
  const [tab, setTab] = useState("nuova");
  const empty = {
    client: "", phone: "", date: TODAY, time: "", pickup: hotelLabel(hotel),
    dropoff: "", pax: 2, vehicle: "car", vehicleTouched: false, bags: "",
    flight: "", ship: "", notes: "", price: "", receptionist: "",
  };
  const [form, setForm] = useState(empty);
  const [sent, setSent] = useState(false);

  const quickOptions = [hotelLabel(hotel), ...PLACES.map((p) => p.label)];
  const base = routeBase(form.pickup, form.dropoff, form.vehicle, hotel.id);
  const priceNum = Number(form.price) || 0;
  const commission = base > 0 && priceNum > 0 ? priceNum - base : 0;
  const priceTooLow = base > 0 && priceNum > 0 && priceNum < base;
  const overCap = base > 0 && priceNum > base + MAX_MARKUP;
  const airportArr = isAirport(form.pickup);
  const portArr = isPort(form.pickup);
  const targetDT = form.date && form.time ? new Date(`${form.date}T${form.time}`) : null;
  const hoursToService = targetDT ? (targetDT - new Date()) / 36e5 : null;
  const urgent = hoursToService !== null && hoursToService <= MOD_LOCK_HOURS;

  const setPax = (e) => {
    const pax = e.target.value;
    setForm((f) => ({
      ...f, pax,
      vehicle: f.vehicleTouched ? f.vehicle : suggestVehicle(pax),
    }));
  };
  const setVehicle = (e) => setForm((f) => ({ ...f, vehicle: e.target.value, vehicleTouched: true }));

  const mine = rides.filter((r) => r.hotelId === hotel.id);
  const completed = mine.filter((r) => r.status === "completata");

function HotelRideCard({ ride, hotel, onUpdate }) {
  const [editing, setEditing] = useState(false);
  const [saved, setSaved] = useState(false);
  const [form, setForm] = useState(null);

  const editable = ride.status === "richiesta" || ride.status === "confermata";
  const target = new Date(`${ride.date}T${ride.time || "00:00"}`);
  const hoursLeft = (target - new Date()) / 36e5;
  const locked = hoursLeft <= MOD_LOCK_HOURS;
  const quickOptions = [hotelLabel(hotel), ...PLACES.map((p) => p.label)];

  const startEdit = () => {
    setForm({
      date: ride.date, time: ride.time, pickup: ride.pickup, dropoff: ride.dropoff,
      pax: ride.pax, vehicle: ride.vehicle || suggestVehicle(ride.pax),
      flight: ride.flight || "", ship: ride.ship || "", notes: ride.notes || "", phone: ride.clientPhone || "",
      price: ride.price > 0 ? ride.price : "",
    });
    setEditing(true);
  };
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const editBase = form ? (ride.status === "richiesta" ? routeBase(form.pickup, form.dropoff, form.vehicle, ride.hotelId) : ride.base || 0) : 0;
  const editPrice = form ? Number(form.price) || 0 : 0;
  const editTooLow = editBase > 0 && editPrice > 0 && editPrice < editBase;
  const editOverCap = editBase > 0 && editPrice > editBase + MAX_MARKUP;
  const valid = form && form.date && form.time && form.pickup && form.dropoff && !editTooLow;

  const save = () => {
    if (!valid) return;
    const patch = {
      date: form.date, time: form.time, pickup: form.pickup, dropoff: form.dropoff,
      pax: Number(form.pax) || 1, flight: form.flight, notes: form.notes,
      clientPhone: form.phone, modified: true,
    };
    if (ride.status === "richiesta") patch.base = editBase;
    patch.vehicle = form.vehicle;
    patch.price = editPrice > 0 ? editPrice : editBase;
    patch.extraMarkup = editOverCap;
    onUpdate(ride.id, patch);
    setEditing(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 4200);
  };

  const waMsg = encodeURIComponent(
    `Salve Carlos, devo modificare la corsa ${ride.code} (${dateIT(ride.date)} ore ${ride.time}).`
  );

  return (
    <RideTicket ride={ride} hotel={hotel}>
      {editable && !editing && !locked && (
        <button
          onClick={startEdit}
          className="mt-3 py-1.5 px-3 rounded-lg text-xs"
          style={{ color: T.gold, border: `1px solid ${T.gold}`, fontFamily: "Jost, sans-serif" }}
        >
          ✎ Modifica corsa
        </button>
      )}

      {editable && !editing && locked && (
        <div
          className="mt-3 text-xs rounded-lg p-3"
          style={{ background: T.goldSoft, color: T.gold, fontFamily: "Jost, sans-serif" }}
        >
          ⏱ Mancano meno di {MOD_LOCK_HOURS} ore al servizio: la corsa non è più modificabile da qui.
          <a
            href={`https://wa.me/${WHATSAPP_NUMBER}?text=${waMsg}`}
            target="_blank"
            rel="noopener noreferrer"
            className="block text-center mt-2 py-2 rounded-lg no-underline font-medium"
            style={{ background: "#25D366", color: "#0B141A" }}
          >
            Contatta Carlos su WhatsApp
          </a>
        </div>
      )}

      {editing && form && (
        <div className="mt-3 pt-3 space-y-3" style={{ borderTop: `1px dashed ${T.line}` }}>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Data"><Input type="date" value={form.date} onChange={set("date")} /></Field>
            <Field label={isAirport(form.pickup) ? "Orario di atterraggio" : isPort(form.pickup) ? "Orario di attracco" : "Ora pickup"}>
              <Input type="time" value={form.time} onChange={set("time")} />
            </Field>
          </div>
          <Field label="Partenza">
            <Input value={form.pickup} onChange={set("pickup")} />
            <Chips options={quickOptions} onPick={(o) => setForm({ ...form, pickup: o })} />
          </Field>
          <Field label="Destinazione">
            <Input value={form.dropoff} onChange={set("dropoff")} />
            <Chips options={quickOptions} onPick={(o) => setForm({ ...form, dropoff: o })} />
          </Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Passeggeri"><Input type="number" min="1" max="8" value={form.pax} onChange={set("pax")} /></Field>
            <Field label="Volo (opzionale)"><Input value={form.flight} onChange={set("flight")} /></Field>
          </div>
          {isPort(form.pickup) && (
            <Field label="Nave / Crociera"><Input value={form.ship} onChange={set("ship")} /></Field>
          )}
          <Field label="Veicolo">
            <select
              value={form.vehicle}
              onChange={set("vehicle")}
              className="w-full rounded-lg px-3 py-2 text-base outline-none"
              style={inputStyle}
            >
              <option value="car">Berlina/SUV · fino a 4 pax</option>
              <option value="van">Van · 5–8 pax o bagagli extra</option>
            </select>
          </Field>
          <Field label="Telefono ospite"><Input type="tel" value={form.phone} onChange={set("phone")} /></Field>
          <Field label="Note per l'autista"><Input value={form.notes} onChange={set("notes")} /></Field>
          <Field label="Prezzo al cliente (€)">
            <Input type="number" min="0" value={form.price} onChange={set("price")} placeholder={editBase > 0 ? String(editBase) : "Da concordare"} />
          </Field>
          {editTooLow && (
            <div className="text-xs rounded-lg px-3 py-2" style={{ background: T.redSoft, color: T.red, fontFamily: "Jost, sans-serif" }}>
              Il prezzo non può essere inferiore al listino ({eur(editBase)}).
            </div>
          )}
          {editOverCap && !editTooLow && (
            <div className="text-xs rounded-lg px-3 py-2" style={{ background: T.goldSoft, color: T.gold, fontFamily: "Jost, sans-serif" }}>
              Supplemento oltre il massimo ({eur(MAX_MARKUP)}): serve la conferma di Carlos.
            </div>
          )}
          <div className="flex gap-2">
            <ActionButton
              label="Salva modifiche"
              busyLabel="Salvo…"
              onAction={save}
              disabled={!valid}
              className="flex-1 py-2 rounded-lg text-xs font-medium"
              style={{
                background: valid ? T.gold : T.surface2,
                color: valid ? "#14110A" : T.muted,
                fontFamily: "Jost, sans-serif",
              }}
            />
            <button
              onClick={() => setEditing(false)}
              className="px-3 py-2 rounded-lg text-xs"
              style={{ color: T.muted, border: `1px solid ${T.line}`, fontFamily: "Jost, sans-serif" }}
            >
              Annulla
            </button>
          </div>
        </div>
      )}

      {saved && (
        <div
          className="mt-3 text-xs rounded-lg py-2 px-3"
          style={{ color: T.green, background: T.greenSoft, fontFamily: "Jost, sans-serif" }}
        >
          ✓ Corsa aggiornata · 📲 Notifica WhatsApp a Carlos (simulata in questa demo)
        </div>
      )}
    </RideTicket>
  );
}

const monthLabel = (ym) => {
  const [y, m] = ym.split("-");
  const d = new Date(Number(y), Number(m) - 1, 1);
  const s = d.toLocaleDateString("it-IT", { month: "long", year: "numeric" });
  return s.charAt(0).toUpperCase() + s.slice(1);
};

              background: tab === k ? T.goldSoft : "transparent",
              color: tab === k ? T.gold : T.muted,

              Nessuna corsa in programma.
            </p>
          )}
          {planned.map((r) => (
            <RideTicket key={r.id} ride={r} hotel={HOTELS.find((h) => h.id === r.hotelId)} showHotel>
              <div className="mt-3 flex items-center gap-2">
                <span className="text-xs uppercase tracking-widest" style={{ color: T.muted, fontFamily: "Jost, sans-serif" }}>

                </span>

                  value={r.driver}

                    `${dateIT(r.date)} · ${isAirport(r.pickup) ? "atterraggio" : isPort(r.pickup) ? "attracco" : "pickup"} ore ${r.time}\n` +
                    `Da: ${r.pickup}\nA: ${r.dropoff}\n` +
                    `Il suo autista sarà ${r.driver}${driverPhone(r.driver) ? ` — contatto diretto: ${driverPhone(r.driver)}` : ""}.\n` +

                    `${dateIT(r.date)} · ${isAirport(r.pickup) ? "atterraggio" : isPort(r.pickup) ? "attracco" : "pickup"} ore ${r.time}\n` +

                    `Da: ${r.pickup}\n` +
                    `A: ${r.dropoff}\n` +
                    `${r.pax} pax · ${vehicleLabel(r.vehicle)}${r.bags > 0 ? ` · ${r.bags} bagagli` : ""}` +
                    `${r.flight ? `\nVolo ${r.flight} · segui live: ${flightUrl(r.flight)}` : ""}` +
                    `${r.ship ? `\nNave ${r.ship}` : ""}` +

                    `\nIncasso: ${eur(r.price)}`

                  target="_blank"

              ) : null}
              <div className="mt-3 flex gap-2">
                <ActionButton
                  label="Segna come completata"
                  busyLabel="Completo…"
                  onAction={() => onUpdate(r.id, { status: "completata", modified: false })}
                  className="flex-1 py-2 rounded-lg text-xs font-medium"

                />
                <ActionButton

                  onAction={() => onUpdate(r.id, { status: "richiesta" })}

              {r.clientPhone ? (
                <a
                  href={`https://wa.me/${r.clientPhone.replace(/\D/g, "")}?text=${encodeURIComponent(
                    `Gentile ${r.client}, grazie per aver viaggiato con LuxWay! 🚘\nSe il servizio è stato di suo gradimento, una recensione su TripAdvisor per noi vale moltissimo:\n${TRIPADVISOR_URL}\nA presto!`

                  target="_blank"
                  rel="noopener noreferrer"
                  className="block text-center mt-3 py-2 rounded-lg no-underline text-xs font-medium"
                  style={{ background: T.goldSoft, color: T.gold, border: `1px solid ${T.gold}`, fontFamily: "Jost, sans-serif" }}
                >
                  ⭐ Chiedi recensione TripAdvisor all'ospite
                </a>
              ) : null}
              <ActionButton
                label="↩ Riporta in programma"
                busyLabel="Riporto…"
                onAction={() => onUpdate(r.id, { status: "confermata" })}
                className="mt-3 py-1.5 px-3 rounded-lg text-xs"
                style={{ color: T.muted, border: `1px solid ${T.line}`, fontFamily: "Jost, sans-serif" }}
              />
            </RideTicket>
          ))}
        </section>
      )}

      {tab === "rifiutate" && (
        <section className="px-4 pt-2 max-w-md lg:max-w-4xl mx-auto grid gap-3 lg:grid-cols-2 items-start">
          {rejected.length === 0 && (
            <p className="text-sm text-center py-10 lg:col-span-2" style={{ color: T.muted, fontFamily: "Jost, sans-serif" }}>
              Nessuna corsa rifiutata.
            </p>
          )}
          {rejected.map((r) => (
            <RideTicket key={r.id} ride={r} hotel={HOTELS.find((h) => h.id === r.hotelId)} showHotel>
              <ActionButton
                label="↩ Ripristina come richiesta"
                busyLabel="Ripristino…"
                onAction={() => onUpdate(r.id, { status: "richiesta" })}
                className="mt-3 py-1.5 px-3 rounded-lg text-xs"
                style={{ color: T.gold, border: `1px solid ${T.gold}`, fontFamily: "Jost, sans-serif" }}

            <Row label="Incasso corse completate" value={eur(revenue)} color={T.ivory} />
            <Row label="Commissioni hotel (eccedenza su listino)" value={`− ${eur(hotelDue)}`} color={T.red} />
            <div style={{ borderTop: `1px dashed ${T.line}` }} className="pt-3">
              <Row label="Netto Carlos" value={eur(net)} color={T.green} big />

            <button
              onClick={() => exportRides(done, "luxway-report-corse")}
              className="mt-4 w-full py-2 rounded-lg text-xs font-medium"
              style={{ color: T.gold, border: `1px solid ${T.gold}`, background: "transparent", fontFamily: "Jost, sans-serif" }}
            >
              ⬇ Esporta report corse (Excel)
            </button>

            style={{ background: T.surface, border: `1px solid ${T.line}` }}

            </div>
            <select
              value={month}
              onChange={(e) => setMonth(e.target.value)}
              className="w-full rounded-lg px-3 py-2 text-base outline-none mb-3"
              style={inputStyle}
            >
              {(months.length ? months : [month]).map((m) => (
                <option key={m} value={m}>{monthLabel(m)}</option>
              ))}
            </select>
            {HOTELS.map((h) => {
              const hDone = monthDone.filter((r) => r.hotelId === h.id);
              const n = hDone.length;
              const tot = hDone.reduce((s, r) => s + hotelCut(r), 0);
              if (n === 0) return null;
              return (
                <div
                  key={h.id}
                  className="flex justify-between py-2 text-sm"
                  style={{ borderBottom: `1px dashed ${T.line}`, fontFamily: "Jost, sans-serif" }}
                >
                  <span style={{ color: T.ivory }}>{h.name} · {n} {n === 1 ? "corsa" : "corse"}</span>
                  <span style={{ color: T.gold }}>{eur(tot)}</span>
                </div>
              );
            })}
            {monthDone.length === 0 && (
              <p className="text-sm py-2" style={{ color: T.muted, fontFamily: "Jost, sans-serif" }}>
                Nessuna corsa completata in questo mese.
              </p>
            )}
            <div className="flex justify-between items-baseline pt-3" style={{ fontFamily: "Jost, sans-serif" }}>
              <span className="text-sm" style={{ color: T.muted }}>Totale da liquidare</span>
              <span className="text-xl" style={{ color: T.gold, fontFamily: "Marcellus, serif" }}>{eur(monthHotelDue)}</span>
            </div>
            {monthDone.length > 0 && (
              <button
                onClick={() => exportRides(monthDone, `liquidazione-hotel-${month}`)}
                className="mt-3 w-full py-2 rounded-lg text-xs font-medium"
                style={{ color: T.gold, border: `1px solid ${T.gold}`, background: "transparent", fontFamily: "Jost, sans-serif" }}
              >
                ⬇ Esporta liquidazione {monthLabel(month)} (Excel)
              </button>
            )}
          </div>
        </section>
      )}
    </div>
  );
}

function Row({ label, value, color, big }) {
  return (
    <div className="flex justify-between items-baseline gap-3">
      <span className="text-sm" style={{ color: T.muted }}>{label}</span>
      <span
        className={big ? "text-xl" : "text-sm"}
        style={{ color, fontFamily: big ? "Marcellus, serif" : "Jost, sans-serif" }}
      >
        {value}
      </span>
    </div>
  );
}

function RequestCard({ ride, onUpdate }) {
  const [price, setPrice] = useState(ride.price > 0 ? ride.price : "");
  const [base, setBase] = useState(ride.base > 0 ? ride.base : routeBase(ride.pickup, ride.dropoff, ride.vehicle || suggestVehicle(ride.pax), ride.hotelId) || "");
  const [driver, setDriver] = useState(ride.driver || DRIVERS[0].name);
  const hotel = HOTELS.find((h) => h.id === ride.hotelId);
  const p = Number(price) || 0;
  const b = Number(base) || 0;
  const canConfirm = p > 0 && b > 0 && p >= b;

  return (
    <RideTicket ride={ride} hotel={hotel} showHotel>
      <div className="mt-3 grid grid-cols-2 gap-3">
        <Field label="Prezzo cliente (€)">
          <Input
            type="number" min="0" value={price}
            onChange={(e) => setPrice(e.target.value)}
            placeholder="Es. 70"
          />
        </Field>
        <Field label="Listino LuxWay (€)">
          <Input
            type="number" min="0" value={base}
            onChange={(e) => setBase(e.target.value)}
            placeholder="Es. 60"
          />
        </Field>
      </div>
      <Field label="Autista">
        <select
          value={driver}
          onChange={(e) => setDriver(e.target.value)}
          className="w-full rounded-lg px-3 py-2 text-base outline-none"
          style={inputStyle}
        >
          {DRIVERS.map((d) => (
            <option key={d.name} value={d.name}>{d.name}</option>
          ))}
        </select>
      </Field>
      {driverPhone(driver) ? (
        <div className="mt-2 text-xs" style={{ color: T.blue, fontFamily: "Jost, sans-serif" }}>
          ☏ {driver}: {driverPhone(driver)} — visibile all'hotel dopo la conferma
        </div>
      ) : null}
      {canConfirm && (
        <div
          className="mt-2 text-xs rounded-lg px-3 py-2 flex flex-wrap gap-x-4 gap-y-1"
          style={{ background: T.goldSoft, fontFamily: "Jost, sans-serif" }}
        >
          <span style={{ color: T.ivory }}>A te: {eur(b)}</span>
          <span style={{ color: T.gold }}>Commissione hotel: {eur(p - b)}</span>
        </div>
      )}
      {canConfirm && p - b > MAX_MARKUP && (
        <div className="mt-2 text-xs rounded-lg px-3 py-2" style={{ background: T.redSoft, color: T.red, fontFamily: "Jost, sans-serif" }}>
          Supplemento oltre il massimo da listino ({eur(MAX_MARKUP)}): verifica con l'hotel.
        </div>
      )}
      {p > 0 && b > 0 && p < b && (
        <div className="mt-2 text-xs rounded-lg px-3 py-2" style={{ background: T.redSoft, color: T.red, fontFamily: "Jost, sans-serif" }}>
          Il prezzo cliente è sotto listino: verifica con l'hotel.
        </div>
      )}
      <div className="mt-3 flex gap-2">
        <ActionButton
          label="Conferma corsa"
          busyLabel="Confermo…"
          onAction={() => onUpdate(ride.id, { status: "confermata", price: p, base: b, driver, modified: false })}
          disabled={!canConfirm}
          className="flex-1 py-2 rounded-lg text-xs font-medium"
          style={{
            background: canConfirm ? T.gold : T.surface2,
            color: canConfirm ? "#14110A" : T.muted,
            fontFamily: "Jost, sans-serif",
          }}
        />
        <ActionButton
          label="Rifiuta"
          busyLabel="Rifiuto…"
          onAction={() => onUpdate(ride.id, { status: "rifiutata" })}
          className="px-4 py-2 rounded-lg text-xs"
          style={{ color: T.red, border: `1px solid ${T.red}`, fontFamily: "Jost, sans-serif" }}
        />
      </div>
    </RideTicket>
  );
}

/* ---------- app ---------- */

function LuxWayApp() {
  const [view, setView] = useState("login"); // login | hotel | admin
  const [hotelId, setHotelId] = useState(HOTELS[0].id);
  const [rides, setRides] = useState(SEED_RIDES);
  const [nextId, setNextId] = useState(1046);

  const hotel = useMemo(() => HOTELS.find((h) => h.id === hotelId), [hotelId]);

  const addRide = (data) => {
    setRides((rs) => [
      ...rs,
      { ...data, id: nextId, code: `LW-${nextId}`, status: "richiesta", driver: "" },
    ]);
    setNextId((n) => n + 1);
  };

  const updateRide = (id, patch) =>
    setRides((rs) => rs.map((r) => (r.id === id ? { ...r, ...patch } : r)));

  const enter = (role, hid) => {
    if (hid) setHotelId(hid);
    setView(role);
  };

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Jost:wght@300;400;500;600&display=swap');
        * { box-sizing: border-box; }
        html { overflow-x: clip; }
        body { margin: 0; min-height: 100vh; overflow-x: clip; overscroll-behavior-y: contain; background: ${T.bg}; }
        input, select, textarea { min-width: 0; max-width: 100%; }
        input[type="date"], input[type="time"] {
          -webkit-appearance: none; appearance: none;
          text-align: left;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .grid > * { min-width: 0; }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
        select option { background: ${T.surface2}; color: ${T.ivory}; }
        button { cursor: pointer; transition: opacity .15s ease, transform .12s ease; }
        button:hover:not(:disabled) { opacity: .88; }
        button:active:not(:disabled) { transform: scale(.96); }
        .spin-dot {
          display: inline-block; width: 12px; height: 12px;
          border: 2px solid currentColor; border-top-color: transparent;
          border-radius: 50%; margin-right: 7px; vertical-align: -2px;
          animation: lwspin .7s linear infinite;
        }
        @keyframes lwspin { to { transform: rotate(360deg); } }
        button:disabled { cursor: default; }
        :focus-visible { outline: 2px solid ${T.gold}; outline-offset: 2px; }
        @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
      `}</style>
      {view === "login" && <Login onEnter={enter} />}
      {view === "hotel" && hotel && (
        <HotelPanel
          hotel={hotel}
          rides={rides}
          onNewRide={addRide}
          onUpdate={updateRide}
          onExit={() => setView("login")}
        />
      )}
      {view === "admin" && (
        <AdminPanel rides={rides} onUpdate={updateRide} onExit={() => setView("login")} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LuxWayApp />);
</script>
</body>
</html>
